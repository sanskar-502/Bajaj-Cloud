version: '3.8'

services:
  policymind-api:
    build: .
    image: policymind-api:latest
    container_name: policymind-backend
    ports:
      - "8000:8000"
    environment:
      # Pass your env vars here for Pinecone, OpenAI, etc.
      - VECTOR_DB_TYPE=pinecone
      - LLM_PROVIDER=openai
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
